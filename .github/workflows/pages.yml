name: Deploy GUARDIAN site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # 营销官网作为站点根
          cp -r website/* _site/
          # App 高保真原型挂到 /app
          mkdir -p _site/app
          cp -r app/* _site/app/
          # 发布会影片(转 ASCII 文件名,便于网页引用)
          if [ -f "GUARDIAN发布会影片.mp4" ]; then
            cp "GUARDIAN发布会影片.mp4" _site/launch-film.mp4
          fi
          # 防止 Jekyll 处理
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
